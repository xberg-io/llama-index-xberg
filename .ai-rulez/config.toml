# AI-Rulez Configuration (migrated to V4 TOML format)
# Documentation: https://github.com/Goldziher/ai-rulez

version = '4.0'
name = 'llama-index-kreuzberg'
description = 'LlamaIndex document reader integration for kreuzberg'
gitignore = true
presets = ['claude', 'codex', 'copilot', 'cursor', 'antigravity']
builtins = ['python', 'default-commands']

[[includes]]
name = 'kreuzberg-core'
source = 'https://github.com/kreuzberg-dev/ai-rulez.git'
path = 'modules/core'
merge_strategy = 'local-override'

[[marketplaces]]
name = "basemind"
source = "Goldziher/basemind"
type = "github"

[[plugins]]
marketplace = "basemind"
name = "basemind"
scope = "project"
enabled = true
